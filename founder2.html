                                    {/* The Cross-Domain Architect's Perspective */}
                                    <h3 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                                        <span className="bg-blue-600 w-1 h-8 rounded-full"></span> 跨領域架構師的視角
                                    </h3>
                                    <p className="text-lg font-medium text-slate-800">身為一名跨領域架構師，我的視野不受限於傳統汽車工程或 IC 設計的單一孤島。這種「由上而下 (Top-down)」的系統工程視角，正是這套架構誕生的原因。</p>
                                    
                                    <p>當產業界正面臨「AI 幻覺 (Hallucination)」問題時，傳統 AI 工程師試圖透過微調模型來解決，而軟體工程師則試圖建立作業系統層級的看門狗 (Watchdog)。受限於自身領域，他們都將這視為一個純粹的「軟體優化」問題。</p>
                                    
                                    <p>透過橋接法律治理、機構問責制與深科技 (Deep Tech)，我發現了一個結構性的盲區。<strong>這不是一個可以靠局部優化來修補的軟體 Bug；這是一個需要「確定性硬體基礎」來填補的法律與證據真空。</strong> 機構並不在乎 AI 的權重有多聰明——他們在乎的是當機器做出致命選擇時，責任歸屬在誰。他們需要無可辯駁的、具備數學嚴謹性的物理證據。</p>
                                    
                                    <p>應用第一性原理 (First principles)，我並不是從寫程式碼開始。我首先透過嚴謹的學術研究 (發表於 SSRN) 與全面的全球專利佈局，定義了<strong>「通用裁決架構 (Universal Adjudication Architecture)」</strong>。目標是為任何 Agentic AI 建立統一的治理標準——無論是應用於無人機、工業物聯網或機器人。</p>
                                    
                                    <p className="text-slate-800 font-medium border-l-4 border-blue-600 pl-4 my-6 bg-slate-50 py-3 pr-3">
                                        我們開發的不是一個「車用修補程式」。我們打造的是「通用硬體治理矽智財 (Universal Hardware Governance IP)」，並刻意選擇了地球上最不容出錯、高風險的環境——ISO 26262 汽車安全標準——作為我們的終極壓力測試。
                                    </p>
                                    
                                    <p>因為，如果我們的架構能夠在數學與物理上保證自駕車達到 4.561 奈秒的絕對確定性與安全性，那麼將其整合到 AI PC 或智慧製造平台中，將會是輕而易舉的降維打擊。</p>

                                    {/* AI Tech */}
                                    <h3 className="text-2xl font-bold text-slate-900 mt-10 mb-4 flex items-center gap-2">
                                        <span className="bg-teal-500 w-1 h-8 rounded-full"></span> 📘 AI 部署：可治理、可驗證、專利保護
                                    </h3>
                                    <p>大多數關於 AI 部署的對話都止步於「能力」。而我們的對話則從「問責」開始。</p>
                                    <p>我一直反覆思考的技術問題不是「模型能做到這點嗎？」，而是「當模型做出決策時，有沒有人能驗證發生了什麼——並為此負責？」這種區別在受監管的環境中至關重要：醫療、金融、交通、執法。在這些領域中，錯誤的輸出不僅僅是使用者體驗不佳，而是嚴重的法律責任。</p>
                                    <p>我的技術核心在於建立讓 AI 具備「法律可採信性 (Admissibility)」的底層架構，而不僅僅是功能性。這意味著在真實世界的人機互動中，建立可追蹤、可驗證的生成與決策紀錄，確保在部署時具備一致性、可重現性與工程等級的可控性。</p>
                                    <p>這些並非等待被驗證的概念。它們是已申請專利的架構、經過測試的原型以及已發表的框架——現在正被構建為跨越台灣、歐盟與美國專利版圖的實際可部署基礎設施。</p>

                                    {/* Why We Do This */}
                                    <h3 className="text-2xl font-bold text-slate-900 mt-10 mb-4 flex items-center gap-2">
                                        <span className="bg-rose-600 w-1 h-8 rounded-full"></span>
                                        <i className="fas fa-globe text-rose-600 mr-1"></i> 我們為何而戰
                                    </h3>
                                    <p className="text-slate-700 font-medium">不是法規創造了急迫性，而是急迫性本來就存在。</p>
                                    <p className="text-slate-700 font-medium">多年來，如何在高風險環境中治理 AI 一直被視為一個哲學問題——雖然重要，但總是被擱置。接著，最後期限逼近了。台灣《人工智慧基本法》於 2026 年 1 月生效；歐盟《AI 法案 (EU AI Act)》針對高風險領域的核心義務將於 2026 年 8 月強制執行。突然之間，「我們以後再來想辦法治理」不再是一個選項。</p>
                                    <p className="text-slate-700 font-medium">我們在 2025 年底就開始了專利佈局——這並非因為我們預見了法規的到來，而是因為我們深刻理解法規試圖解決的「結構性問題」。時機的吻合，是因為底層邏輯的吻合。</p>
                                    <p className="text-slate-700 font-medium">當法規框架降臨時，我們並非手忙腳亂地應付合規要求。我們已經建構好了解答。</p>
                                    <p className="text-slate-700 font-medium">我們的架構——在 2025 微軟 Agentic AI 企業應用實戰賽中獲選為前十強，並根植於我們 2026 年 2 月在 SSRN 發表的治理框架——能在 TrustZone 等級的安全環境中強制執行確定性邏輯。它能在離線狀態下運作，並產出機構真正能夠在法庭上使用的不可變紀錄。這不是因為它是圍繞著法規設計的，而是因為它基於一個核心事實：機構不需要完美的 AI，機構需要的是「站得住腳的防禦證據」。</p>

                                    {/* Strategic Evolution Journey */}
                                    <div className="mt-12 mb-8 bg-slate-50 p-8 rounded-2xl border border-slate-100">
                                        <h3 className="text-xl font-bold text-slate-900 mb-6 flex items-center gap-2">
                                            <WIcon name="Lightbulb" className="text-amber-500" />
                                            從記錄到裁決：建構 AI 時代的治理架構
                                        </h3>
                                        <p className="text-sm text-slate-600 mb-6 italic">
                                            這段旅程並不是從專利開始的。它是從一個越來越難以忽視的問題開始的：
                                            <br/><br/>
                                            <span className="text-slate-800 not-italic font-medium">如果 AI 系統做出了一個重大決策——而事情出了差錯——有什麼實體證據是任何人都可以實際檢驗的？</span>
                                            <br/><br/>
                                            在大多數的部署中，答案是：沒有結構化的東西。沒有可重放的機制。沒有任何東西能經得起機構的嚴格審查。這不是「模型」的問題，這是「治理架構」的問題。而且它需要一個工程解法。
                                        </p>
                                        <div className="space-y-6">
                                            <div className="pl-4 border-l-2 border-slate-200">
                                                <h4 className="text-sm font-bold text-slate-800 uppercase tracking-wide mb-1">階段 1 — 不可變紀錄生成 (2025年11月)</h4>
                                                <p className="text-sm text-slate-600 leading-relaxed">
                                                    第一步是基礎性的：停止試圖控制模型的輸出，轉而開始控制「發生了什麼」的記錄。兩份專利申請標誌著這一轉變——將目標從「模型對齊 (Alignment)」轉向了「結構化可追溯性 (Traceability)」。
                                                </p>
                                            </div>
                                            <div className="pl-4 border-l-2 border-slate-200">
                                                <h4 className="text-sm font-bold text-slate-800 uppercase tracking-wide mb-1">階段 2 — 可重放的裁決機制 (2025年12月)</h4>
                                                <p className="text-sm text-slate-600 leading-relaxed">
                                                    沒有判斷邏輯的記錄只不過是流水帳。治理要求決策邏輯本身必須是確定性的、版本化的，且可從外部進行檢驗。這打破了循環信任的難題：你不再需要「信任 AI 才能信任結果」。
                                                </p>
                                            </div>
                                            <div className="pl-4 border-l-2 border-slate-200">
                                                <h4 className="text-sm font-bold text-slate-800 uppercase tracking-wide mb-1">階段 3 — 應用場景合規驗證 (2026年1月)</h4>
                                                <p className="text-sm text-slate-600 leading-relaxed">
                                                    OHACSS 平台將此架構帶入受高度監管的醫療與工安領域。這不是一個展示 Demo，這是在真實合規約束下測試的可部署軟體基礎設施。
                                                </p>
                                            </div>
                                            <div className="pl-4 border-l-2 border-slate-200">
                                                <h4 className="text-sm font-bold text-slate-800 uppercase tracking-wide mb-1">階段 4 — 機構可接受性理論化 (2026年2月)</h4>
                                                <p className="text-sm text-slate-600 leading-relaxed">
                                                    發表於 SSRN 的學術論文定義了我們專利生態系統的核心哲學：<strong>「機構可接受性 (Institutional Acceptability)」</strong>。
                                                    <br/><br/>

                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => (
            <>
                <FounderPage />
                <Footer />
            </>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
